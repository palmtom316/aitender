services:
  postgres:
    image: postgres:16
    container_name: aitender-postgres
    environment:
      POSTGRES_DB: aitender
      POSTGRES_USER: aitender
      POSTGRES_PASSWORD: secret
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitender -d aitender"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - aitender-postgres-data:/var/lib/postgresql/data

volumes:
  aitender-postgres-data:
